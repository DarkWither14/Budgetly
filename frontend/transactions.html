<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budgetly – Transactions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app-wrapper">
  <div id="navContainer"></div>

  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title">Transactions</h1>
      <div class="btn-row">
        <button class="btn btn-outline btn-sm" onclick="triggerImport()">
          <i class="bi bi-upload"></i> Import CSV
        </button>
        <button class="btn btn-outline btn-sm" onclick="doExport()">
          <i class="bi bi-download"></i> Export CSV
        </button>
        <button class="btn btn-primary" onclick="openModal()">
          <i class="bi bi-plus-lg"></i> Add Transaction
        </button>
      </div>
    </div>

    <div id="noPidBanner" class="alert alert-info" style="display:none">
      <i class="bi bi-info-circle-fill"></i>
      No profile selected. <a href="profiles.html">Create or select a profile</a> first.
    </div>
    <div id="importResult" style="display:none"></div>

    <!-- Filters -->
    <div class="filter-bar" id="filterBar">
      <div>
        <label>Type</label>
        <select id="filterType" onchange="renderTable()">
          <option value="">All</option>
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
      </div>
      <div>
        <label>Category</label>
        <select id="filterCat" onchange="renderTable()">
          <option value="">All</option>
        </select>
      </div>
      <div>
        <label>From</label>
        <input type="date" id="filterFrom" onchange="renderTable()" />
      </div>
      <div>
        <label>To</label>
        <input type="date" id="filterTo" onchange="renderTable()" />
      </div>
    </div>

    <!-- Table -->
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Type</th>
              <th>Category</th>
              <th>Group</th>
              <th>Note</th>
              <th style="text-align:right">Amount</th>
              <th style="text-align:center">Actions</th>
            </tr>
          </thead>
          <tbody id="txnBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="txnModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Add Transaction</span>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>

    <div id="formError" class="alert alert-danger" style="display:none"></div>

    <div class="form-row">
      <div class="form-group">
        <label>Amount ($) *</label>
        <input type="number" id="fAmount" min="0.01" step="0.01" placeholder="0.00" />
      </div>
      <div class="form-group">
        <label>Date *</label>
        <input type="date" id="fDate" />
      </div>
    </div>

    <div class="form-group">
      <label>Type *</label>
      <div class="type-toggle">
        <label>
          <input type="radio" name="fType" value="expense" checked />
          <span><i class="bi bi-arrow-up-circle"></i> Expense</span>
        </label>
        <label>
          <input type="radio" name="fType" value="income" />
          <span><i class="bi bi-arrow-down-circle"></i> Income</span>
        </label>
      </div>
    </div>

    <div class="form-group">
      <label>Category</label>
      <select id="fCategory">
        <option value="">— Uncategorized —</option>
      </select>
    </div>

    <div class="form-group">
      <label>Group <span style="color:var(--text-muted)">(optional)</span></label>
      <select id="fGroup">
        <option value="">— No Group —</option>
      </select>
    </div>

    <div class="form-group">
      <label>Note <span style="color:var(--text-muted)">(max 500 chars)</span></label>
      <textarea id="fNote" maxlength="500" rows="2" placeholder="Optional note…"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTransaction()">Save</button>
    </div>
  </div>
</div>

<!-- Hidden file input for CSV import -->
<input type="file" id="csvInput" accept=".csv,text/csv" style="display:none" onchange="handleImport(event)" />

<script src="js/storage.js"></script>
<script src="js/nav.js"></script>
<script>
  let editingId = null;

  // ---- Init ----
  renderNav('transactions');

  const pid = getActiveProfileId();
  if (!pid) {
    document.getElementById('noPidBanner').style.display = '';
    document.getElementById('filterBar').style.display   = 'none';
  }

  // Populate category filter
  getCategories().forEach(c => {
    const o = document.createElement('option');
    o.value = c.id; o.textContent = c.name;
    document.getElementById('filterCat').appendChild(o);
  });

  renderTable();

  // ---- Render ----
  function renderTable() {
    const type   = document.getElementById('filterType').value;
    const catId  = document.getElementById('filterCat').value;
    const from   = document.getElementById('filterFrom').value;
    const to     = document.getElementById('filterTo').value;
    const cats   = getCategories();
    const groups = pid ? getGroupsByProfile(pid) : [];

    let txns = pid ? getTransactionsByProfile(pid) : [];
    if (type)  txns = txns.filter(t => t.type === type);
    if (catId) txns = txns.filter(t => t.categoryId === catId);
    if (from)  txns = txns.filter(t => t.date >= from);
    if (to)    txns = txns.filter(t => t.date <= to);

    txns.sort((a, b) => new Date(b.date) - new Date(a.date));

    const tbody = document.getElementById('txnBody');
    if (!txns.length) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state">
        <i class="bi bi-receipt"></i><p>No transactions found.</p></div></td></tr>`;
      return;
    }
    tbody.innerHTML = txns.map(t => {
      const cat   = cats.find(c => c.id === t.categoryId);
      const grp   = groups.find(g => g.id === t.groupId);
      return `<tr>
        <td style="white-space:nowrap">${formatDate(t.date)}</td>
        <td><span class="badge badge-${t.type}">${t.type}</span></td>
        <td>${cat ? cat.name : '<span style="color:var(--text-muted)">—</span>'}</td>
        <td>${grp ? `<span class="badge badge-group">${grp.name}</span>` : '<span style="color:var(--text-muted)">—</span>'}</td>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.note || '—'}</td>
        <td style="text-align:right" class="amount-${t.type}">${t.type === 'expense' ? '−' : '+'}${formatCurrency(t.amount)}</td>
        <td style="text-align:center;white-space:nowrap">
          <button class="btn btn-ghost btn-icon" title="Edit" onclick="openModal('${t.id}')"><i class="bi bi-pencil"></i></button>
          <button class="btn btn-danger btn-icon" title="Delete" onclick="confirmDelete('${t.id}')"><i class="bi bi-trash"></i></button>
        </td>
      </tr>`;
    }).join('');
  }

  // ---- Modal ----
  function openModal(id) {
    editingId = id || null;
    document.getElementById('modalTitle').textContent = id ? 'Edit Transaction' : 'Add Transaction';
    document.getElementById('formError').style.display = 'none';

    // Populate type radios default
    document.querySelector('input[name="fType"][value="expense"]').checked = true;

    // Populate categories (filtered by type)
    populateCategorySelect();

    // Populate groups
    const gSel = document.getElementById('fGroup');
    gSel.innerHTML = '<option value="">— No Group —</option>';
    if (pid) getGroupsByProfile(pid).forEach(g => {
      const o = document.createElement('option');
      o.value = g.id; o.textContent = g.name;
      gSel.appendChild(o);
    });

    if (id) {
      const t = getTransactions().find(x => x.id === id);
      if (!t) return;
      document.getElementById('fAmount').value = t.amount;
      document.getElementById('fDate').value   = t.date;
      document.querySelector(`input[name="fType"][value="${t.type}"]`).checked = true;
      populateCategorySelect(t.type, t.categoryId);
      document.getElementById('fGroup').value  = t.groupId || '';
      document.getElementById('fNote').value   = t.note || '';
    } else {
      document.getElementById('fAmount').value = '';
      document.getElementById('fDate').value   = todayISO();
      document.getElementById('fNote').value   = '';
      document.getElementById('fGroup').value  = '';
      document.getElementById('fCategory').value = '';
    }

    document.getElementById('txnModal').classList.add('open');
  }

  function populateCategorySelect(type, selectedId) {
    const activeType = type || document.querySelector('input[name="fType"]:checked').value;
    const cSel = document.getElementById('fCategory');
    cSel.innerHTML = '<option value="">— Uncategorized —</option>';
    getCategoriesByType(activeType).forEach(c => {
      const o = document.createElement('option');
      o.value = c.id; o.textContent = c.name;
      if (c.id === selectedId) o.selected = true;
      cSel.appendChild(o);
    });
  }

  // Re-filter categories when type changes
  document.querySelectorAll('input[name="fType"]').forEach(r =>
    r.addEventListener('change', () => populateCategorySelect()));

  function closeModal() {
    document.getElementById('txnModal').classList.remove('open');
    editingId = null;
  }

  function saveTransaction() {
    const errEl  = document.getElementById('formError');
    const amount = parseFloat(document.getElementById('fAmount').value);
    const date   = document.getElementById('fDate').value;
    const type   = document.querySelector('input[name="fType"]:checked').value;
    const catId  = document.getElementById('fCategory').value;
    const grpId  = document.getElementById('fGroup').value;
    const note   = document.getElementById('fNote').value;

    if (!amount || amount <= 0) return showError('Please enter a valid amount.');
    if (!date)                  return showError('Please select a date.');
    if (!pid)                   return showError('No active profile selected.');

    errEl.style.display = 'none';

    if (editingId) {
      updateTransaction(editingId, { categoryId: catId, groupId: grpId, amount, type, date, note });
    } else {
      createTransaction({ profileId: pid, categoryId: catId, groupId: grpId, amount, type, date, note });
    }
    closeModal();
    renderTable();
  }

  function showError(msg) {
    const el = document.getElementById('formError');
    el.textContent    = msg;
    el.style.display  = '';
  }

  function confirmDelete(id) {
    showConfirm('Delete this transaction? This cannot be undone.', () => {
      deleteTransaction(id);
      renderTable();
    });
  }

  // ---- CSV ----
  function triggerImport() {
    if (!pid) return alert('Select a profile first.');
    document.getElementById('csvInput').value = '';
    document.getElementById('csvInput').click();
  }

  function handleImport(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const { imported, errors } = importCSV(ev.target.result, pid);
      const el = document.getElementById('importResult');
      el.style.display = '';
      if (errors.length) {
        el.className = 'alert alert-warning';
        el.innerHTML = `<i class="bi bi-exclamation-triangle-fill"></i> Imported ${imported} row(s). ${errors.length} error(s): ${errors.slice(0,3).join('; ')}`;
      } else {
        el.className = 'alert alert-success';
        el.innerHTML = `<i class="bi bi-check-circle-fill"></i> Successfully imported ${imported} transaction(s).`;
      }
      renderTable();
    };
    reader.readAsText(file);
  }

  function doExport() {
    if (!pid) return alert('Select a profile first.');
    const csv      = exportCSV(pid);
    const profile  = getProfileById(pid);
    triggerDownload(`budgetly-${profile ? profile.name.replace(/\s+/g,'-') : 'export'}-${todayISO()}.csv`, csv);
  }
</script>
</body>
</html>
