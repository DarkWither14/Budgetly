<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budgetly – Profiles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app-wrapper">
  <div id="navContainer"></div>

  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title">Profiles</h1>
      <button class="btn btn-primary" onclick="openModal()">
        <i class="bi bi-plus-lg"></i> Add Profile
      </button>
    </div>

    <div id="profilesContainer"></div>
  </main>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="profileModal">
  <div class="modal" style="max-width:460px">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Add Profile</span>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>

    <div id="formError" class="alert alert-danger" style="display:none"></div>

    <div class="form-group">
      <label>Name *</label>
      <input type="text" id="fName" maxlength="60" placeholder="e.g. My Budget" />
    </div>

    <div class="form-group">
      <label>Description <span style="color:var(--text-muted)">(optional)</span></label>
      <textarea id="fDesc" maxlength="300" rows="2" placeholder="Brief description…"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveProfile()">Save</button>
    </div>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/nav.js"></script>
<script>
  let editingId = null;

  renderNav('profiles');
  injectConfirmDialog();
  renderProfiles();

  // ---- Render ----
  function renderProfiles() {
    const profiles   = getProfiles();
    const activePid  = getActiveProfileId();
    const container  = document.getElementById('profilesContainer');

    if (!profiles.length) {
      container.innerHTML = `<div class="empty-state">
        <i class="bi bi-person-circle"></i>
        <p>No profiles yet. Create one to start tracking your budget.</p>
      </div>`;
      return;
    }

    container.innerHTML = profiles.map(p => {
      const txnCount  = getTransactionsByProfile(p.id).length;
      const goalCount = getGoalsByProfile(p.id).length;
      const isActive  = p.id === activePid;

      return `
        <div class="profile-card ${isActive ? 'active-profile' : ''}">
          <div class="profile-avatar">${p.name.charAt(0).toUpperCase()}</div>
          <div class="profile-body">
            <div class="profile-name">
              ${p.name}
              ${isActive ? '<span class="badge-active">Active</span>' : ''}
            </div>
            ${p.description ? `<div class="profile-desc">${p.description}</div>` : ''}
            <div class="profile-meta">
              <span><i class="bi bi-receipt"></i> ${txnCount} transaction${txnCount !== 1 ? 's' : ''}</span>
              <span><i class="bi bi-bullseye"></i> ${goalCount} goal${goalCount !== 1 ? 's' : ''}</span>
              <span><i class="bi bi-calendar3"></i> Since ${formatDate(p.createdAt)}</span>
            </div>
          </div>
          <div class="profile-actions">
            ${!isActive ? `<button class="btn btn-outline btn-sm" onclick="activateProfile('${p.id}')"><i class="bi bi-check-circle"></i> Set Active</button>` : ''}
            <button class="btn btn-ghost btn-icon" title="Edit" onclick="openModal('${p.id}')"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-danger btn-icon" title="Delete" onclick="confirmDeleteProfile('${p.id}','${escHtml(p.name)}')"><i class="bi bi-trash"></i></button>
          </div>
        </div>`;
    }).join('');
  }

  function escHtml(s) { return s.replace(/'/g, "\\'"); }

  function activateProfile(id) {
    setActiveProfileId(id);
    renderProfiles();
    // Refresh nav dropdown
    const sel = document.getElementById('globalProfileSelect');
    if (sel) sel.value = id;
  }

  // ---- Modal ----
  function openModal(id) {
    editingId = id || null;
    document.getElementById('modalTitle').textContent  = id ? 'Edit Profile' : 'Add Profile';
    document.getElementById('formError').style.display = 'none';

    if (id) {
      const p = getProfileById(id);
      if (!p) return;
      document.getElementById('fName').value = p.name;
      document.getElementById('fDesc').value = p.description || '';
    } else {
      document.getElementById('fName').value = '';
      document.getElementById('fDesc').value = '';
    }

    document.getElementById('profileModal').classList.add('open');
    document.getElementById('fName').focus();
  }

  function closeModal() {
    document.getElementById('profileModal').classList.remove('open');
    editingId = null;
  }

  function saveProfile() {
    const name  = document.getElementById('fName').value.trim();
    const desc  = document.getElementById('fDesc').value.trim();
    const errEl = document.getElementById('formError');

    if (!name) { errEl.textContent = 'Profile name is required.'; errEl.style.display = ''; return; }

    errEl.style.display = 'none';

    if (editingId) {
      updateProfile(editingId, { name, description: desc });
    } else {
      createProfile({ name, description: desc });
    }

    closeModal();
    renderProfiles();

    // Refresh nav profile dropdown
    const sel = document.getElementById('globalProfileSelect');
    if (sel) {
      sel.innerHTML = '<option value="">— Select Profile —</option>';
      const active = getActiveProfileId();
      getProfiles().forEach(p => {
        const o = document.createElement('option');
        o.value = p.id; o.textContent = p.name;
        if (p.id === active) o.selected = true;
        sel.appendChild(o);
      });
    }
  }

  function confirmDeleteProfile(id, name) {
    showConfirm(`Delete profile "${name}" and ALL its transactions, goals, and groups? This cannot be undone.`, () => {
      deleteProfile(id);
      renderProfiles();
      // Refresh sidebar nav to reflect removal
      const sel = document.getElementById('globalProfileSelect');
      if (sel) {
        sel.innerHTML = '<option value="">— Select Profile —</option>';
        const active = getActiveProfileId();
        getProfiles().forEach(p => {
          const o = document.createElement('option');
          o.value = p.id; o.textContent = p.name;
          if (p.id === active) o.selected = true;
          sel.appendChild(o);
        });
      }
    });
  }
</script>
</body>
</html>
